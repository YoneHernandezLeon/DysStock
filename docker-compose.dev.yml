services:

  mysql-dev:
    image: mysql:8
    restart: always
    env_file:
      - .env.dev
    ports:
      - "3307:3306"
    volumes:
      - mysql-dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    
    environment:
      CHOKIDAR_USEPOLLING: "true"

    volumes:
      - ./backend:/app

    env_file:
      - .env.dev
    
    ports:
      - "8000:8000"
    
    depends_on:
      mysql-dev:
        condition: service_healthy
  
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    
    volumes:
      - ./frontend:/app
      - /app/node_modules
    
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_TARGET: "http://backend-dev:8000"
      
    
    ports:
      - "5173:5173"
    
    depends_on:
      - backend-dev

volumes:
  mysql-dev_data: