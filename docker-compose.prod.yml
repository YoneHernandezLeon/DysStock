services:

  mysql:
    image: mysql:8
    restart: always
    env_file:
      - .env.dev
    volumes:
      - mysql_prod_data:/var/lib/mysql
    expose:
      - 3306

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    env_file:
      - .env.prod
    
    expose:
      - 8000
    
    depends_on:
      - mysql
    
    restart: always
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    
    ports:
      - "80:80"
    
    restart: always

volumes:
  mysql_prod_data: